##############################################
# EventHub configuration
##############################################
image:
  repository: ghcr.io/olesku/eventhub
  # tag defaults to "v<Chart.appVersion>" when left empty, so the image
  # version follows the chart/app version. Override only to pin a specific tag.
  tag: ""
  pullPolicy: IfNotPresent

replicas: 1

https:
  enabled: false
  port: 8443
  # Required when https.enabled is true. Terminate TLS in eventhub itself by
  # providing a certificate, either by referencing an existing kubernetes.io/tls
  # secret or by supplying the cert/key inline (a secret is then created).
  # Alternatively leave https disabled and terminate TLS at the ingress/LB.
  tls:
    existingSecret: ""
    cert: ""
    key: ""

http:
  enabled: true

config: |-
  log_level                = info
  enable_cache             = false
  ping_interval            = 30
  handshake_timeout        = 10

jwtSecret:
  # Required. Provide a high-entropy secret used to verify JWTs. Either set an
  # explicit value (a Secret is created for you) or reference an existing
  # kubernetes.io/Opaque secret. There is intentionally no default — shipping a
  # known signing key would be insecure. If you run eventhub with auth disabled
  # in `config`, set value to any non-empty placeholder.
  # existingSecret:
  #   name: "my-jwt-secret"
  #   key: "jwt_secret"
  value: ""

service:
  type: LoadBalancer
  annotations: {}
  http:
    enabled: true
    port: 80
  https:
    enabled: false
    port: 443

ingress:
  enabled: false
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

  hosts:
    - host: eventhub.your-domain.com
      paths:
        - path: /
          pathType: Prefix

  tls:
    - secretName: eventhub-tls-secret
      hosts:
        - eventhub.your-domain.com

resources:
  requests:
    cpu: 500m
    memory: 256Mi

annotations:
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8080"
  prometheus.io/scheme: "http"
  prometheus.io/scrape: "true"

affinity: {}

##############################################
# Valkey configuration
##############################################
valkey:
  enabled: true

  image:
    repository: docker.io/valkey/valkey
    tag: "8.1.4"
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"

  dataStorage:
    enabled: false

  auth:
    enabled: false

  valkeyLogLevel: "notice"

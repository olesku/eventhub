name: Build and push Docker image

# Reusable workflow: builds a multi-arch (amd64 + arm64) image natively on
# per-arch runners, pushes each by digest, then assembles a single multi-arch
# manifest. eventhub compiles from source in the Dockerfile, so we use native
# runners rather than QEMU emulation to keep build times reasonable.
on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to publish (e.g. v1.5.0). Validated by the caller."
        required: true
        type: string
      tag_latest:
        description: "Also tag the resulting manifest as 'latest' (stable releases only)."
        required: false
        default: false
        type: boolean
    outputs:
      image_ref:
        description: "Published multi-arch image reference."
        value: ${{ jobs.merge.outputs.image_ref }}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Resolve image name and platform pair
        id: prep
        env:
          REPO: ${{ github.repository }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          # GHCR requires a lowercase image path. Emit as a step output so it is
          # usable in expression contexts (e.g. the build step's `outputs:`).
          image="${REGISTRY}/$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.prep.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.prep.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.pair }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.ref.outputs.image_ref }}
    steps:
      - name: Resolve image name
        run: |
          set -euo pipefail
          image="${REGISTRY}/$(printf '%s' "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        id: ref
        working-directory: /tmp/digests
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          TAG_LATEST: ${{ inputs.tag_latest }}
        run: |
          set -euo pipefail
          tags=( "-t" "${IMAGE}:${IMAGE_TAG}" )
          if [ "${TAG_LATEST}" = "true" ]; then
            tags+=( "-t" "${IMAGE}:latest" )
          fi
          docker buildx imagetools create "${tags[@]}" \
            $(printf "${IMAGE}@sha256:%s " *)
          echo "image_ref=${IMAGE}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Inspect manifest
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: docker buildx imagetools inspect "${IMAGE}:${IMAGE_TAG}"

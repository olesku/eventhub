name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        redis-version: [5, 6]

    steps:
    - name: Git checkout
      uses: actions/checkout@v1

    - name: Install required packages
      run: sudo apt-get -f install git make cmake cmake-data ninja-build libhiredis-dev libssl-dev libfmt-dev libspdlog-dev
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Build and install redis-plus-plus library
      run: |
        git clone https://github.com/sewenew/redis-plus-plus.git && \
        cd redis-plus-plus && \
        git checkout tags/1.3.15 && \
        mkdir compile && \
        cd compile && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr .. && \
        ninja -j0 && \
        sudo ninja install && \
        cd ../..

    - name: Build Eventhub
      run: |
        mkdir -p build && cd build && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release .. && \
        ninja -j0

    - name: Start Redis
      uses: supercharge/redis-github-action@1.1.0
      with:
        redis-version: ${{ matrix.redis-version }}

    - name: Run tests
      run: |
        ./build/eventhub_tests

  e2e:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Git checkout
      uses: actions/checkout@v4

    - name: Checkout eventhub-pyclient
      uses: actions/checkout@v4
      with:
        repository: olesku/eventhub-pyclient
        ref: master
        path: eventhub-pyclient

    - name: Log eventhub-pyclient commit
      run: |
        git -C eventhub-pyclient rev-parse HEAD

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install required packages
      run: sudo apt-get -f install git make cmake cmake-data ninja-build libhiredis-dev libssl-dev libfmt-dev libspdlog-dev
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Build and install redis-plus-plus library
      run: |
        git clone https://github.com/sewenew/redis-plus-plus.git && \
        cd redis-plus-plus && \
        git checkout tags/1.3.15 && \
        mkdir compile && \
        cd compile && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr .. && \
        ninja -j0 && \
        sudo ninja install && \
        cd ../..

    - name: Build Eventhub
      run: |
        mkdir -p build && cd build && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release .. && \
        ninja -j0

    - name: Install pyclient dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install websockets

    - name: Start Redis
      uses: supercharge/redis-github-action@1.1.0
      with:
        redis-version: 6

    - name: Run e2e tests
      run: |
        EVENTHUB_PYCLIENT_PATH=$GITHUB_WORKSPACE/eventhub-pyclient/src \
        LD_LIBRARY_PATH=$GITHUB_WORKSPACE/build:/usr/local/lib:/usr/lib \
        python tests/harness/e2e.py --start-eventhub --check-data-integrity --with-auth

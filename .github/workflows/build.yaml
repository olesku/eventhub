name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Allow the release workflow to reuse this as a test gate.
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        redis-version: [5, 6]

    steps:
    - name: Git checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install required packages
      run: sudo apt-get -f install git make cmake cmake-data ninja-build libhiredis-dev libssl-dev libfmt-dev libspdlog-dev
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Build and install redis-plus-plus library
      run: |
        git clone https://github.com/sewenew/redis-plus-plus.git && \
        cd redis-plus-plus && \
        git checkout a63ac43bf192772910b52e27cd2b42a6098a0071 && \
        mkdir compile && \
        cd compile && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr .. && \
        ninja -j0 && \
        sudo ninja install && \
        cd ../..

    - name: Build Eventhub
      run: |
        mkdir -p build && cd build && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release .. && \
        ninja -j0

    - name: Start Redis
      uses: supercharge/redis-github-action@8dd3c86cd02fabe1bc459d55ba892a9ce91e23c6 # 1.1.0
      with:
        redis-version: ${{ matrix.redis-version }}

    - name: Run tests
      run: |
        ./build/eventhub_tests

  e2e:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Git checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Checkout eventhub-pyclient
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: olesku/eventhub-pyclient
        ref: master
        path: eventhub-pyclient

    - name: Log eventhub-pyclient commit
      run: |
        git -C eventhub-pyclient rev-parse HEAD

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.11"

    - name: Install required packages
      run: sudo apt-get -f install git make cmake cmake-data ninja-build libhiredis-dev libssl-dev libfmt-dev libspdlog-dev
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Build and install redis-plus-plus library
      run: |
        git clone https://github.com/sewenew/redis-plus-plus.git && \
        cd redis-plus-plus && \
        git checkout a63ac43bf192772910b52e27cd2b42a6098a0071 && \
        mkdir compile && \
        cd compile && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr .. && \
        ninja -j0 && \
        sudo ninja install && \
        cd ../..

    - name: Build Eventhub
      run: |
        mkdir -p build && cd build && \
        cmake -GNinja -DCMAKE_BUILD_TYPE=Release .. && \
        ninja -j0

    - name: Install pyclient dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install websockets

    - name: Start Redis
      uses: supercharge/redis-github-action@8dd3c86cd02fabe1bc459d55ba892a9ce91e23c6 # 1.1.0
      with:
        redis-version: 6

    - name: Run e2e tests
      run: |
        EVENTHUB_PYCLIENT_PATH=$GITHUB_WORKSPACE/eventhub-pyclient/src \
        LD_LIBRARY_PATH=$GITHUB_WORKSPACE/build:/usr/local/lib:/usr/lib \
        python tests/harness/e2e.py --start-eventhub --check-data-integrity --with-auth
